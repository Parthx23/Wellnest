<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#131513" />
  <meta name="description"
    content="WellNest – Your personal daily wellness habit tracker. Track hydration, sleep, activity, meals, screen breaks, and stress relief with a beautiful wellness score." />
  <title>WellNest – Daily Wellness Tracker</title>

  <!-- Design System Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    rel="stylesheet" />

  <!-- App Styles -->
  <link rel="stylesheet" href="css/styles.css?v=5" />

  <!-- PWA / mobile meta -->
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/svg+xml"
    href="C:\Users\parth\OneDrive\Desktop\wellnest\icons\0001-9118036015437569928.png" />
  <link rel="apple-touch-icon" href="C:\Users\parth\OneDrive\Desktop\wellnest\icons\0001-9118036015437569928.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
</head>

<body>

  <div id="app-shell">

    <!-- ── Dynamic page content ── -->
    <div id="app" style="flex:1;display:flex;flex-direction:column;"></div>

    <!-- ── Bottom Navigation (hidden on onboarding) ── -->
    <nav class="bottom-nav" id="bottom-nav" style="display:none">
      <button class="nav-item" data-nav="dashboard" onclick="Router.navigate('dashboard')" id="nav-dashboard">
        <span class="material-symbols-outlined">today</span>
        <span>Today</span>
      </button>
      <button class="nav-item" data-nav="insights" onclick="Router.navigate('insights')" id="nav-insights">
        <span class="material-symbols-outlined">insert_chart</span>
        <span>Insights</span>
      </button>
      <button class="nav-item" data-nav="history" onclick="Router.navigate('history')" id="nav-history">
        <span class="material-symbols-outlined">history</span>
        <span>History</span>
      </button>
      <button class="nav-item" data-nav="settings" onclick="Router.navigate('settings')" id="nav-settings">
        <span class="material-symbols-outlined">settings</span>
        <span>Settings</span>
      </button>
    </nav>

  </div>

  <!-- ── Scripts ── -->
  <script src="js/store.js"></script>
  <script src="js/router.js"></script>
  <script src="js/plant.js"></script>
  <script src="js/voice.js"></script>
  <script src="js/orbit.js"></script>
  <script src="js/pages/onboarding.js"></script>
  <script src="js/pages/dashboard.js"></script>
  <script src="js/pages/insights.js"></script>
  <script src="js/pages/history.js"></script>
  <script src="js/pages/settings.js"></script>

  <script>
    // ── Bootstrap ───────────────────────────────────────────────────────────
    (function () {
      // Apply persisted theme — light is default, so only add class for dark
      const prefs = Store.getPrefs();
      if (prefs.theme === 'dark') {
        document.documentElement.classList.add('dark-mode');
      }

      // Register routes
      Router.register('onboarding', () => {
        document.getElementById('bottom-nav').style.display = 'none';
        renderOnboarding();
      });

      Router.register('dashboard', () => {
        document.getElementById('bottom-nav').style.display = '';
        renderDashboard();
        Router.updateNav('dashboard');
      });

      Router.register('insights', () => {
        document.getElementById('bottom-nav').style.display = '';
        renderInsights();
        Router.updateNav('insights');
      });

      Router.register('history', () => {
        document.getElementById('bottom-nav').style.display = '';
        renderHistory();
        Router.updateNav('history');
      });

      Router.register('settings', () => {
        document.getElementById('bottom-nav').style.display = '';
        renderSettings();
        Router.updateNav('settings');
      });

      // Initial route
      Router.resolve();

      // Register Service Worker for PWA
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js')
            .then(reg => console.log('ServiceWorker registered:', reg.scope))
            .catch(err => console.error('ServiceWorker registration failed:', err));
        });
      }
    })();
  </script>

</body>

</html>
